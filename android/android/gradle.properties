org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# AndroidX
android.useAndroidX=true
android.enableJetifier=false

# Build speed
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Disable Kotlin incremental compilation — required on Windows when the project
# is on a different drive (F:\) than the Pub cache (C:\). Kotlin's incremental
# cache uses relative paths which fail across Windows drive letters.
kotlin.incremental=false

# R8 full mode — aggressive dead-code removal
android.enableR8.fullMode=true

# Resource namespace isolation
android.nonTransitiveRClass=true
